spring:
  application:
    name: scriptorium

  datasource:
    url: jdbc:postgresql://localhost:5432/${POSTGRES_DB}
    username: ${POSTGRES_USER}
    password: ${POSTGRES_PASSWORD}
    driver-class-name: org.postgresql.Driver

  neo4j:
    uri: bolt://localhost:7687
    authentication:
      username: ${NEO4J_USER}
      password: ${NEO4J_PASSWORD}

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: true

  flyway:
    enabled: true


  Secret_key_for_token: CuriouserAndCuriouser_EveryoneIsMadHere